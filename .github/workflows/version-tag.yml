name: Version Tag

# Etiquetado automatico de versiones:
# - push a dev  -> tag pre-release vX.Y.Z-qas.N (version QAS)
# - push a main -> tag release vX.Y.Z (version PROD)
# El numero sube segun conventional commits desde el ultimo tag:
# feat -> minor, fix/perf -> patch. Commits docs/chore/ci no generan tag.

on:
  push:
    branches: [main, dev]

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Bump version and push tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: false
          default_prerelease_bump: false
          release_branches: main
          pre_release_branches: dev
          append_to_pre_release_tag: qas
